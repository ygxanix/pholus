name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_and_sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Build OSS Release APKs
        run: ./gradlew assembleOssRelease

      - name: Sign APKs
        uses: iota9star/sign-android-release@v1.0.5
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/oss/release
          fileRex: .*apk
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASS }}
          keyPassword: ${{ secrets.KEY_STORE_PASS }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APKs
        run: |
          cd app/build/outputs/apk/oss/release
          echo "=== Files in release directory ==="
          ls -la
          echo "=== Renaming signed APKs ==="
          COUNT=0
          for apk in *-signed.apk; do
            [ -f "$apk" ] || continue
            if [[ "$apk" == *"arm64-v8a"* ]]; then
              mv "$apk" "Pholus-${VERSION}-arm64-v8a.apk"
            elif [[ "$apk" == *"armeabi-v7a"* ]]; then
              mv "$apk" "Pholus-${VERSION}-armeabi-v7a.apk"
            elif [[ "$apk" == *"x86_64"* ]]; then
              mv "$apk" "Pholus-${VERSION}-x86_64.apk"
            elif [[ "$apk" == *"universal"* ]]; then
              mv "$apk" "Pholus-${VERSION}-universal.apk"
            else
              mv "$apk" "Pholus-${VERSION}-${COUNT}.apk"
            fi
            COUNT=$((COUNT + 1))
          done
          echo "=== Renamed APKs ==="
          ls -la Pholus-*.apk 2>/dev/null || echo "WARNING: No Pholus APKs found"
          # Move renamed APKs to workspace root for easy access
          mv Pholus-*.apk $GITHUB_WORKSPACE/ 2>/dev/null || true

      - name: Upload signed APKs
        uses: actions/upload-artifact@v4
        with:
          name: Pholus-Signed-APKs
          path: |
            Pholus-*.apk
            app/build/outputs/apk/oss/release/Pholus-*.apk

  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build_and_sign

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download signed APKs
        uses: actions/download-artifact@v4
        with:
          name: Pholus-Signed-APKs

      - name: Display downloaded APKs
        run: |
          echo "=== All files ==="
          ls -la
          echo "=== APK files ==="
          find . -name '*.apk' -type f

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Detect pre-release
        run: |
          if [[ "$VERSION" == *-* ]]; then
            echo "PRE_RELEASE=true" >> $GITHUB_ENV
          else
            echo "PRE_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - use all commits
            COMMITS=$(git log --pretty=format:"* %s" --no-merges -20)
            COMPARE_TEXT=""
          else
            # Get commits between tags
            COMMITS=$(git log --pretty=format:"* %s" --no-merges ${PREV_TAG}..HEAD)
            COMPARE_TEXT="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${VERSION}"
          fi

          # Write to file to handle multiline
          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            if [ -n "$COMPARE_TEXT" ]; then
              echo "$COMPARE_TEXT"
            fi
          } > release_notes.md

          cat release_notes.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Pholus-*.apk"
          bodyFile: release_notes.md
          prerelease: ${{ env.PRE_RELEASE }}
          name: ${{ env.VERSION }}
          tag: ${{ env.VERSION }}
          makeLatest: true
