name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-oss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Build OSS Debug APK
        run: ./gradlew assembleOssDebug

      - name: Upload OSS Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PholusChat-OSS-Debug-APK
          path: app/build/outputs/apk/oss/debug/*.apk

  build-play:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Build Play Debug APK
        run: ./gradlew assemblePlayDebug

      - name: Upload Play Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PholusChat-Play-Debug-APK
          path: app/build/outputs/apk/play/debug/*.apk
